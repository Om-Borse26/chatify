[build]
  # Use the root build script so Netlify runs your monorepo orchestrator
  # (the root `package.json` build script installs backend/frontend and
  # then builds the frontend). This ensures frontend devDependencies
  # like `vite` are installed before the build runs.
  command = "npm run build"
  publish = "frontend/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https:; object-src 'none'; base-uri 'self'"
