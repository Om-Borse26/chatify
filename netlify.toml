[build]
  # Run installs for backend and frontend, ensure frontend devDependencies
  # (vite) are installed, then build the frontend. We set
  # NPM_CONFIG_PRODUCTION=false so npm installs devDependencies on Netlify.
  command = "npm install --prefix backend && npm --prefix frontend ci --include=dev && npm --prefix frontend run build"
  publish = "frontend/dist"

[build.environment]
  NPM_CONFIG_PRODUCTION = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https:; object-src 'none'; base-uri 'self'"
